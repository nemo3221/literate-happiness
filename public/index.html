<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLIPPER MINI APP</title>
    <style>
        /* Глубокий черный с мягким радиальным градиентом в центре */
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            background-attachment: fixed;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            padding: 20px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            margin-top: 40px;
            margin-bottom: 30px; 
            letter-spacing: 3px;
            font-weight: 800;
            text-transform: uppercase;
        }

        img { 
            width: 240px; 
            border-radius: 30px; 
            margin-bottom: 35px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Кнопки: темно-серые, почти черные, с четким белым текстом */
        .btn { 
            display: block; 
            background: #111111; 
            color: #ffffff; 
            padding: 20px; 
            margin: 10px 0; 
            width: 90%; 
            max-width: 350px;
            border-radius: 16px; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 16px;
            border: 1px solid #333333;
            transition: all 0.2s ease;
        }

        /* Эффект при нажатии */
        .btn:active { 
            transform: scale(0.98);
            background: #222222;
        }
    </style>
</head>
<body>
    <h1>FLIPPER</h1>
    
    <img src="pepe_plush.png" alt="Pepe">
    
    <a href="https://getgems.io" class="btn">GETGEMS</a>
    <a href="https://fragment.com" class="btn">FRAGMENT</a>
</body>
</html>
