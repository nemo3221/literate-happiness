<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLIPPER ELITE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        body { 
            background: linear-gradient(-45deg, #000, #0a0e14, #16213e, #000);
            background-size: 400% 400%; animation: gradientMove 10s ease infinite;
            color: #fff; font-family: sans-serif; text-align: center; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        h1 { margin-top: 30px; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; }
        .img-container {
            width: 220px; height: 220px; margin: 20px 0;
            border-radius: 40px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(0, 122, 255, 0.3);
        }
        img { width: 100%; height: 100%; object-fit: cover; }
        .btn { 
            display: block; background: rgba(255, 255, 255, 0.07); color: #fff; 
            padding: 20px; margin: 10px 0; width: 280px; border-radius: 20px; 
            text-decoration: none; font-weight: bold; border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <h1>FLIPPER</h1>
    <div class="img-container">
        <img src="pepe.gif" alt="Pepe">
    </div>
    <a href="https://getgems.io" class="btn">💎 GETGEMS</a>
    <a href="https://fragment.com" class="btn">🧩 FRAGMENT</a>
    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
