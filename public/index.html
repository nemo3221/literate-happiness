<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLIPPER ELITE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes floating { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        
        body { 
            background: linear-gradient(-45deg, #000000, #0a0e14, #16213e, #000000);
            background-size: 400% 400%; animation: gradientMove 10s ease infinite;
            color: #ffffff; font-family: -apple-system, system-ui, sans-serif; 
            text-align: center; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .content { margin-top: 45px; width: 90%; max-width: 380px; }

        h1 { font-size: 32px; letter-spacing: 8px; font-weight: 300; text-transform: uppercase; margin-bottom: 25px; }

        .img-box {
            display: inline-block; animation: floating 4s ease-in-out infinite;
            width: 220px; height: 220px; border-radius: 45px; overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 122, 255, 0.2);
            margin-bottom: 30px;
        }

        img { width: 100%; height: 100%; object-fit: cover; }

        .btn { 
            display: block; background: rgba(255, 255, 255, 0.05); color: #fff; 
            padding: 20px; margin: 15px 0; border-radius: 22px; 
            text-decoration: none; font-weight: 600; font-size: 14px;
            letter-spacing: 2px; text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); transition: all 0.3s ease;
        }

        .btn:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div class="content">
        <h1>FLIPPER</h1>
        <div class="img-box">
            <img src="pepe.gif" alt="Winking Pepe">
        </div>
        <a href="https://getgems.io" class="btn">💎 GETGEMS</a>
        <a href="https://fragment.com" class="btn">🧩 FRAGMENT</a>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    </script>
</body>
</html>
