<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLIPPER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стиль в точности как ты утвердил */
        body { 
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%) no-repeat;
            background-color: #000;
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { 
            margin-top: 30px; 
            letter-spacing: 2px; 
            font-weight: 900; 
            font-size: 32px;
        }
        img { 
            width: 220px; 
            border-radius: 20px; 
            margin: 20px 0; 
            border: 1px solid #333; 
        }
        .btn { 
            display: block; 
            background: #111; 
            color: #fff; 
            padding: 18px; 
            margin: 10px auto; 
            width: 85%; 
            max-width: 350px;
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 16px;
            border: 1px solid #444; 
        }
    </style>
</head>
<body>
    <h1>FLIPPER</h1>
    
    <img src="pepe_plush.png" alt="Pepe">
    
    <a href="https://getgems.io" class="btn">GETGEMS</a>
    <a href="https://fragment.com" class="btn">FRAGMENT</a>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    </script>
</body>
</html>
