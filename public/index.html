<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLIPPER ELITE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        body { 
            background: linear-gradient(-45deg, #000000, #0a0e14, #16213e, #000000);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            color: #ffffff; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 { margin-top: 40px; letter-spacing: 8px; font-weight: 300; text-transform: uppercase; }
        img { width: 200px; border-radius: 40px; margin: 20px 0; animation: pulse 4s infinite; border: 1px solid rgba(255,255,255,0.1); }
        .btn-container { width: 85%; }
        .btn { 
            display: block; background: rgba(255, 255, 255, 0.05); color: #fff; 
            padding: 18px; margin: 12px 0; border-radius: 20px; 
            text-decoration: none; font-weight: 600; font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>
    <h1>FLIPPER</h1>
    <img src="pepe_plush.png" alt="Pepe">
    <div class="btn-container">
        <a href="https://getgems.io" class="btn">GETGEMS</a>
        <a href="https://fragment.com" class="btn">FRAGMENT</a>
    </div>

    <script>
        // Инициализация WebApp
        const tele = window.Telegram.WebApp;
        tele.ready(); // Сообщаем Телеграму, что сайт загрузился
        tele.expand(); // Разворачиваем на весь экран
    </script>
</body>
</html>
