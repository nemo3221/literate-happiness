<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLIPPER ELITE</title>
    <style>
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            /* Глубокий черный и холодный стальной синий. Без грязи. */
            background: linear-gradient(-45deg, #000000, #0a0e14, #16213e, #000000);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        h1 { 
            margin-top: 50px; 
            font-size: 32px;
            letter-spacing: 8px; /* Сильный разбег букв = премиум */
            font-weight: 300;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        img { 
            width: 230px; 
            border-radius: 40px; 
            margin: 30px 0; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        .btn-container { width: 85%; max-width: 360px; }

        .btn { 
            display: block; 
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff; 
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 20px; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover { 
            background: rgba(255, 255, 255, 0.1);
            border-color: #007aff; /* Акцентный синий Apple */
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.2);
        }

        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>FLIPPER</h1>
    
    <img src="pepe_plush.png" alt="Pepe">
    
    <div class="btn-container">
        <a href="https://getgems.io" class="btn">GETGEMS</a>
        <a href="https://fragment.com" class="btn">FRAGMENT</a>
    </div>
</body>
</html>
